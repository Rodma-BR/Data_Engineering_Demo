# The main pipeline for Data_Demo

resources:
  pipelines:
    Data_Demo_etl:
      name: Data_Demo_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/Data_Demo_etl"

      libraries:
        - glob:
            include: ../src/Data_Demo_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
